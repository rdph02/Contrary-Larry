        function levelOf(id) { return player.skillLevels[id] || 0; }
        function getChosenTree() { return player.chosenTree || 'NONE'; }

        function picksInTree(tree) {
            return upgrades.filter(u => u.tree === tree).reduce((sum, u) => sum + levelOf(u.id), 0);
        }
        
        function lockOpposingTrees(tree) {
            if (tree === 'UNIVERSAL') return;
            const levelsInTree = picksInTree(tree);
            if (levelsInTree >= SPECIALIZATION_THRESHOLD && !player.chosenTree) {
                player.chosenTree = tree;
                player.lockedTrees = treeNames.filter(t => t !== tree);
                // Secret specialization bonuses
                if (tree === 'BERSERKER') {
                    player.swordDamage *= 1.4;
                    player.swordSwingRate = Math.max(200, player.swordSwingRate * 0.75);
                    player.swordShockwave = true;
                    showSecretMessage('⚔ BLADE MASTER\nSword mastered · Shockwave unlocked · Swing cooldown reduced');
                }
                if (tree === 'REANIMATION') {
                    player.permanentStaff = true;
                    player.necromancerStaff = true; // ensure it's on immediately
                    player.minionTaunt = true;       // thralls now draw enemy aggro
                    // Flash a secret message
                    showSecretMessage('☠ NECROMANCER AWAKENED\nStaff permanent · Thralls taunt enemies · Charged shots unlocked');
                }
            }
        }

        let _secretMsgTimer = 0;
        let _secretMsgText = '';
        function showSecretMessage(text) {
            _secretMsgText = text;
            _secretMsgTimer = 220;
        }
        
        function isUpgradeAvailable(u) {
            if (player.lockedTrees.includes(u.tree)) return false;
            if (levelOf(u.id) >= u.max) return false;
            if (u.requires && levelOf(u.requires) <= 0) return false;
            return true;
        }
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });
        canvas.addEventListener('mousedown', () => { mouse.down = true; });
        canvas.addEventListener('mouseup', () => { mouse.down = false; });
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === 'p' || e.key === 'Escape') togglePause();
            if (e.key === ' ' && gameState === 'playing') dash();
        });
        document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
        
        function startGame() {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('pauseBtn').classList.remove('hidden');
            gameState = 'playing';
            spawnWave();
            gameLoop();
        }
        
        function togglePause() {
            if (gameState === 'menu' || gameState === 'gameover' || gameState === 'upgrade') return;
            const menu = document.getElementById('pauseMenu');
            if (!isPaused) {
                previousGameState = gameState;
                gameState = 'paused';
                isPaused = true;
                menu.classList.remove('hidden');
                document.getElementById('pauseBtn').textContent = 'RESUME';
            } else {
                gameState = previousGameState === 'paused' ? 'playing' : previousGameState;
                isPaused = false;
                menu.classList.add('hidden');
                document.getElementById('pauseBtn').textContent = 'PAUSE';
            }
        }
        
        function setMapSizeForWave() {
            const growthSteps = Math.min(3, Math.floor((wave - 1) / 4));
            const newW = Math.min(MAX_CANVAS_WIDTH, BASE_CANVAS_WIDTH + growthSteps * 120);
            const newH = Math.min(MAX_CANVAS_HEIGHT, BASE_CANVAS_HEIGHT + growthSteps * 90);
            if (canvas.width !== newW || canvas.height !== newH) {
                const oldW = canvas.width;
                const oldH = canvas.height;
                canvas.width = newW;
                canvas.height = newH;
                ctx.imageSmoothingEnabled = false;
                player.x += (newW - oldW) / 2;
                player.y += (newH - oldH) / 2;
                mouse.x += (newW - oldW) / 2;
                mouse.y += (newH - oldH) / 2;
            }
        }
        
        function spawnWave() {
            setMapSizeForWave();
            waveSpawned = 0;
            waveTarget = 8 + wave * 4 + Math.floor(wave / 3) * 2;
            const spawnDelay = Math.max(150, 500 - wave * 18);
            if (activeSpawnInterval) clearInterval(activeSpawnInterval);
            if (player.undyingLoyalty) player.loyaltyUsed = false; // reset per wave
            soulShards = [];
            activeSpawnInterval = setInterval(() => {
                if (gameState !== 'playing') return;
                if (waveSpawned >= waveTarget) {
                    clearInterval(activeSpawnInterval);
                    activeSpawnInterval = null;
                    return;
                }
                spawnEnemy();
                waveSpawned++;
            }, spawnDelay);
        }
        
        function chooseEnemyType() {
            const pool = [
                { kind: 'scout', radius: 7, speed: 2.2 + wave * 0.08, health: 25 + wave * 4, contact: 0.8, color: '#00ff41', points: 10 },
                { kind: 'agent', radius: 9, speed: 1.5 + wave * 0.06, health: 45 + wave * 8, contact: 1.2, color: '#ff0041', points: 15 }
            ];
            if (wave >= 2) pool.push({ kind: 'bruiser', radius: 12, speed: 1.0 + wave * 0.04, health: 80 + wave * 12, contact: 2.0, armor: 0.15, color: '#ff6b00', points: 25 });
            if (wave >= 3) pool.push({ kind: 'shield', radius: 10, speed: 1.2 + wave * 0.05, health: 60 + wave * 10, contact: 1.0, armor: 0.25, color: '#c77dff', points: 20 });
            if (wave >= 5) pool.push({ kind: 'marksman', radius: 8, speed: 1.0 + wave * 0.03, health: 55 + wave * 9, contact: 0.7, shootRate: 110, shootTimer: 60, color: '#facc15', points: 35 });
            if (wave >= 7) pool.push({ kind: 'saboteur', radius: 8, speed: 2.6 + wave * 0.05, health: 45 + wave * 7, contact: 2.5, sprintTimer: 0, color: '#fb7185', points: 40 });
            if (wave >= 9) pool.push({ kind: 'handler', radius: 11, speed: 1.1 + wave * 0.03, health: 120 + wave * 14, contact: 1.3, aura: true, color: '#38bdf8', points: 60 });
            if (wave >= 12 && Math.random() < 0.18) pool.push({ kind: 'nikitaGuard', radius: 14, speed: 1.3 + wave * 0.03, health: 220 + wave * 20, contact: 2.8, armor: 0.20, shootRate: 80, shootTimer: 40, color: '#ef4444', points: 120 });
            return pool[Math.floor(Math.random() * pool.length)];
        }
        
        function spawnEnemy() {
            const side = Math.floor(Math.random() * 4);
            let x, y;
            if (side === 0) { x = Math.random() * canvas.width; y = -25; }
            else if (side === 1) { x = canvas.width + 25; y = Math.random() * canvas.height; }
            else if (side === 2) { x = Math.random() * canvas.width; y = canvas.height + 25; }
            else { x = -25; y = Math.random() * canvas.height; }
            enemies.push({ x, y, vx: 0, vy: 0, ...chooseEnemyType() });
        }
        
        function shoot() {
            // BERSERKER: sword mode replaces shooting
            if (player.hasSword) {
                swingSword();
                return;
            }
            const now = Date.now();
            let currentFireRate = player.fireRate;
            if (player.killBoostTimer > 0) currentFireRate *= 0.85;

            // Necromancer's Staff mode: charge while held, release fires mega orb
            if (player.necromancerStaff) {
                if (mouse.down) {
                    // Charge up (handled in update)
                    if (now - player.lastShot < currentFireRate * 0.6) return;
                    // Fire small quick orb while charging if not holding long enough
                    if (player.staffCharge < 0.05) {
                        player.lastShot = now;
                        fireStaffPulse(false);
                    }
                }
                return;
            }

            if (now - player.lastShot < currentFireRate) return;
            player.lastShot = now;

            const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            for (let i = 0; i < player.multishot; i++) {
                for (let s = 0; s < player.spread; s++) {
                    const spreadAngle = (s - (player.spread - 1) / 2) * 0.25;
                    const finalAngle = angle + spreadAngle + (Math.random() - 0.5) * 0.08;
                    bullets.push(makeBullet(player.x, player.y, finalAngle, player.damage));
                }
            }
        }

        // Staff pulse: dark orb. charged=true fires a mega orb scaled to chargeLevel (0..1)
        function fireStaffPulse(charged, chargeLevel) {
            const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            const baseDmg = Math.max(12, player.damage * 0.55) * (player.staffPowerBonus ? 1.6 : 1);
            const baseRadius = player.staffPowerBonus ? 22 : 14;
            let dmg, radius, speed;
            if (charged && chargeLevel > 0.15) {
                const c = Math.min(1, chargeLevel);
                dmg = baseDmg * (1.5 + c * 3.5);   // up to 5x damage at full charge
                radius = baseRadius + c * 28;
                speed = 2.5;
                createParticles(player.x, player.y, '#7c3aed', 30);
                createParticles(player.x, player.y, '#c4b5fd', 15);
            } else {
                dmg = baseDmg;
                radius = baseRadius;
                speed = 3.2;
            }
            bullets.push({
                x: player.x, y: player.y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius, hitRadius: radius,
                damage: dmg,
                piercing: true,
                hits: 99,
                age: 0,
                bounces: 0,
                isStaffOrb: true,
                isCharged: charged,
                hitEnemies: new Set()
            });
            if (!charged) createParticles(player.x, player.y, '#a78bfa', 12);
        }
        
        function makeBullet(x, y, angle, damage) {
            const size = Math.min(player.bulletSize, MAX_BULLET_SIZE);
            return {
                x, y,
                vx: Math.cos(angle) * player.bulletSpeed,
                vy: Math.sin(angle) * player.bulletSpeed,
                radius: size,
                hitRadius: Math.min(size * 1.5, MAX_BULLET_HITBOX),
                damage,
                piercing: player.piercing,
                hits: 0,
                age: 0,
                bounces: player.ricochet ? 1 : 0
            };
        }
        
        function swingSword() {
            if (!player.hasSword) return;
            const now = Date.now();
            let cooldown = player.swordSwingRate;
            const raging = player.berserkerRage && player.health < player.maxHealth * (player.swordRange >= 90 ? 0.6 : 0.4);
            if (raging) cooldown *= 0.5;
            if (now - player.swordLastSwing < cooldown) return;
            player.swordLastSwing = now;
            const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            player.swordAngle = angle;
            player.swordSwingTimer = 12; // frames the swing is active
            applySwordHit(angle, player.swordRange, raging);
            if (player.swordEchoBlade) {
                // spectral echo: half damage, slightly wider, offset timing
                setTimeout(() => applySwordHit(angle, player.swordRange + 12, raging, true), 80);
            }
            // Shockwave: charge builds on each swing, releases knockback blast
            player.shockwaveCharge++;
            if (player.swordShockwave && player.shockwaveCharge >= 3) {
                player.shockwaveCharge = 0;
                enemies.forEach(e => {
                    const d = Math.hypot(e.x - player.x, e.y - player.y);
                    if (d < 120) {
                        const ka = Math.atan2(e.y - player.y, e.x - player.x);
                        e.x += Math.cos(ka) * 28;
                        e.y += Math.sin(ka) * 28;
                        e.health -= player.swordDamage * 0.3;
                    }
                });
                createParticles(player.x, player.y, '#fff', 30);
            }
        }

        function applySwordHit(angle, range, raging, echo = false) {
            const arcHalf = player.swordArcWidth;
            let dmgMult = echo ? 0.5 : 1.0;
            if (raging) dmgMult *= 1.5;
            enemies.forEach(e => {
                const d = Math.hypot(e.x - player.x, e.y - player.y);
                if (d > range + e.radius) return;
                const eAngle = Math.atan2(e.y - player.y, e.x - player.x);
                let diff = eAngle - angle;
                while (diff > Math.PI) diff -= 2 * Math.PI;
                while (diff < -Math.PI) diff += 2 * Math.PI;
                if (Math.abs(diff) > arcHalf) return;
                const dmg = player.swordDamage * dmgMult;
                e.health -= dmg;
                // Lifesteal
                if (player.swordLifesteal > 0) {
                    player.health = Math.min(player.maxHealth, player.health + dmg * player.swordLifesteal);
                }
                // Fire: apply burn
                if (player.swordOnFire && !echo) {
                    e._burnDps = Math.max(e._burnDps || 0, player.swordFireDamage);
                    e._burnTimer = Math.max(e._burnTimer || 0, 120);
                    createParticles(e.x, e.y, '#ff6b00', 6);
                    createParticles(e.x, e.y, '#fde68a', 3);
                    // Drop a fire pool on the ground at enemy pos
                    if (player.swordOnFire) {
                        player.fireTrails.push({ x: e.x, y: e.y, life: 90, radius: 18 });
                    }
                    // Inferno spread: burning enemies spread to neighbors
                    if (player.swordFireDamage >= 12) {
                        enemies.forEach(other => {
                            if (other !== e && Math.hypot(other.x - e.x, other.y - e.y) < 55 && !(other._burnTimer > 0)) {
                                other._burnDps = player.swordFireDamage * 0.5;
                                other._burnTimer = 80;
                            }
                        });
                    }
                }
                // Knockback from sword strike
                const ka = Math.atan2(e.y - player.y, e.x - player.x);
                e.x += Math.cos(ka) * (echo ? 4 : 9);
                e.y += Math.sin(ka) * (echo ? 4 : 9);
                createParticles(e.x, e.y, echo ? '#c4b5fd' : '#fff', echo ? 4 : 8);
            });
        }

        function updateSwordAndFire() {
            if (!player.hasSword) return;
            if (player.swordSwingTimer > 0) player.swordSwingTimer--;

            // Whirlwind
            if (player.swordWhirlwind) {
                if (player.whirlwindTimer > 0) {
                    player.whirlwindTimer--;
                } else {
                    // Trigger whirlwind: full 360 hit
                    const wwAngle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
                    const savedArc = player.swordArcWidth;
                    player.swordArcWidth = Math.PI; // full circle via two opposite swings
                    applySwordHit(wwAngle, player.swordRange + 10, false);
                    applySwordHit(wwAngle + Math.PI, player.swordRange + 10, false);
                    player.swordArcWidth = savedArc;
                    createParticles(player.x, player.y, player.swordOnFire ? '#ff6b00' : '#00ff41', 40);
                    if (player.swordOnFire) createParticles(player.x, player.y, '#fde68a', 20);
                    player.whirlwindTimer = player.whirlwindCooldownMax || 300;
                }
            }

            // Burn ticks on enemies
            enemies.forEach(e => {
                if (e._burnTimer > 0) {
                    e._burnTimer--;
                    if (e._burnTimer % 15 === 0) {
                        e.health -= e._burnDps;
                        createParticles(e.x, e.y, '#ff6b00', 2);
                    }
                } else {
                    e._burnDps = 0;
                }
            });

            // Fire trail pools: linger on ground and burn enemies inside them
            player.fireTrails = player.fireTrails.filter(ft => {
                ft.life--;
                enemies.forEach(e => {
                    if (Math.hypot(e.x - ft.x, e.y - ft.y) < ft.radius + e.radius) {
                        e._burnDps = Math.max(e._burnDps || 0, player.swordFireDamage * 0.6);
                        e._burnTimer = Math.max(e._burnTimer || 0, 40);
                    }
                });
                if (Math.random() < 0.15) createParticles(ft.x + (Math.random()-0.5)*ft.radius, ft.y + (Math.random()-0.5)*ft.radius, '#ff6b00', 1);
                return ft.life > 0;
            });
        }

        function fireBarrage() {            if (!player.hasBarrage) return;
            barrageTimer--;
            const rate = Math.max(20, 70 - (player.barrageRateBonus || 0));
            if (barrageTimer > 0) return;
            barrageTimer = rate;
            for (let i = 0; i < 12; i++) {
                const angle = (Math.PI * 2 / 12) * i + Date.now() / 500;
                bullets.push(makeBullet(player.x, player.y, angle, player.barrageDamage || player.damage * 0.5));
            }
        }
        
        function dash() {
            if (!player.hasDash || player.dashCooldown > 0) return;
            const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            player.x += Math.cos(angle) * 80;
            player.y += Math.sin(angle) * 80;
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
            player.iframes = 35;
            player.dashCooldown = player.dashMaxCooldown || 70;
            createParticles(player.x, player.y, '#9bf6ff', 25);
            if (player.dashBlast) {
                enemies.forEach(e => {
                    if (Math.hypot(e.x - player.x, e.y - player.y) < 90) e.health -= player.damage * 1.2;
                });
            }
        }
        
        function update() {
            if (gameState !== 'playing') return;
            if (player.iframes > 0) player.iframes--;
            if (player.dashCooldown > 0) player.dashCooldown--;
            if (player.autoDodgeCooldown > 0) player.autoDodgeCooldown--;
            if (player.killBoostTimer > 0) player.killBoostTimer--;
            if (player.hasRegen && waveSpawned % 6 === 0 && Math.random() < 0.02) player.health = Math.min(player.maxHealth, player.health + 0.25);
            
            let dx = 0, dy = 0;
            if (keys['w'] || keys['arrowup']) dy -= 1;
            if (keys['s'] || keys['arrowdown']) dy += 1;
            if (keys['a'] || keys['arrowleft']) dx -= 1;
            if (keys['d'] || keys['arrowright']) dx += 1;
            if (dx || dy) {
                const mag = Math.hypot(dx, dy);
                player.x += (dx / mag) * player.speed;
                player.y += (dy / mag) * player.speed;
            }
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
            
            if (mouse.down) shoot();
            // Staff charged shot: charge while held, fire on release
            if (player.necromancerStaff && player.permanentStaff) {
                if (mouse.down) {
                    player.staffCharge = Math.min(1, player.staffCharge + 0.008);
                } else if (player.staffCharge > 0.15) {
                    fireStaffPulse(true, player.staffCharge);
                    player.staffCharge = 0;
                    player.lastShot = Date.now();
                } else {
                    player.staffCharge = 0;
                }
            }
            fireBarrage();
            updateSwordAndFire();
            updateBullets();
            updateEnemies();
            updateEnemyBullets();
            updateMinions();
            updatePowerupsAndParticles();
            updateSoulShards();
            if (_secretMsgTimer > 0) _secretMsgTimer--;
            
            if (enemies.length === 0 && waveSpawned >= waveTarget && gameState === 'playing') {
                gameState = 'upgrade';
                showUpgradeMenu();
            }
            if (player.health <= 0) gameOver();
            updateUI();
        }
        
        function updateBullets() {
            bullets = bullets.filter(b => {
                b.x += b.vx;
                b.y += b.vy;
                b.age++;
                if (b.bounces > 0 && (b.x < 0 || b.x > canvas.width)) { b.vx *= -1; b.bounces--; }
                if (b.bounces > 0 && (b.y < 0 || b.y > canvas.height)) { b.vy *= -1; b.bounces--; }
                return b.x > -30 && b.x < canvas.width + 30 && b.y > -30 && b.y < canvas.height + 30 && b.age < 120;
            });
            bullets.forEach(b => {
                // Staff orb: clear hit tracking for enemies no longer in contact (allow re-hit on re-entry)
                if (b.isStaffOrb && b.hitEnemies.size > 0) {
                    b.hitEnemies.forEach(eIdx => {
                        const e = enemies[eIdx];
                        if (!e || Math.hypot(b.x - e.x, b.y - e.y) >= b.hitRadius + e.radius) {
                            b.hitEnemies.delete(eIdx);
                        }
                    });
                }
                enemies.forEach((e, eIdx) => {
                    const dist = Math.hypot(b.x - e.x, b.y - e.y);
                    if (dist < b.hitRadius + e.radius) {
                        // Staff orbs: only hit each enemy once while overlapping
                        if (b.isStaffOrb) {
                            if (b.hitEnemies.has(eIdx)) return;
                            b.hitEnemies.add(eIdx);
                            e.health -= b.damage * (1 - (e.armor || 0));
                            createParticles(e.x, e.y, '#a78bfa', 8);
                            return;
                        }
                        const armor = e.armor || 0;
                        let dmg = b.damage;
                        const crit = Math.random() < (player.critChance || 0);
                        if (crit) {
                            dmg *= 2;
                            if (player.critReload) player.lastShot -= player.fireRate * 0.35;
                        }
                        if (player.lastStand && player.health < player.maxHealth * 0.35) dmg *= 1.35;
                        if (player.killBoostTimer > 0) dmg *= 1.25;
                        // Sabotage: weakened enemies take more damage
                        if (player.weakenStrength > 0 && e._weakTimer > 0) dmg *= (1 + player.weakenStrength);
                        // Sabotage: marked enemies take +60% damage
                        if (player.saboteurMark && e._marked) dmg *= 1.6;
                        e.health -= dmg * (1 - armor);
                        // Apply Sabotage status effects (skip if bullet from minion to keep minions from stacking buffs unfairly)
                        if (!b.fromMinion) {
                            if (player.slowOnHit > 0) {
                                e._slowAmount = Math.max(e._slowAmount || 0, player.slowOnHit);
                                e._slowTimer = Math.max(e._slowTimer || 0, player.slowDuration);
                            }
                            if (player.poisonDamage > 0) {
                                e._poisonDps = Math.max(e._poisonDps || 0, player.poisonDamage);
                                e._poisonTimer = Math.max(e._poisonTimer || 0, player.poisonDuration);
                            }
                            if (player.weakenStrength > 0) e._weakTimer = 60;
                            if (player.stunChance > 0 && Math.random() < player.stunChance) e._stunTimer = 30;
                            if (player.saboteurMark) e._marked = true;
                            if (player.confuseEnemies && Math.random() < 0.10) e._confused = 90;
                        }
                        if (player.explosiveRounds) createExplosion(e.x, e.y, player.chainExplosions);
                        if (player.recoil > 0) {
                            const knockbackAngle = Math.atan2(e.y - player.y, e.x - player.x);
                            e.x += Math.cos(knockbackAngle) * player.recoil * 6;
                            e.y += Math.sin(knockbackAngle) * player.recoil * 6;
                        }
                        if (!b.piercing) b.x = -999;
                        else if (++b.hits > 3) b.x = -999;
                        createParticles(e.x, e.y, crit ? '#ffffff' : e.color, crit ? 10 : 5);
                    }
                });
            });
        }
        
        function updateEnemies() {
            enemies.forEach(e => {
                // Status effect timers
                if (e._slowTimer > 0) e._slowTimer--; else e._slowAmount = 0;
                if (e._stunTimer > 0) e._stunTimer--;
                if (e._weakTimer > 0) e._weakTimer--;
                if (e._confused > 0) e._confused--;
                if (e._minionSlow > 0) e._minionSlow--;
                if (e._poisonTimer > 0) {
                    e._poisonTimer--;
                    const poisonInterval = (player.slowOnHit > 0.6 ? 8 : 16); // Total Sabotage doubles tick rate
                    if (e._poisonTimer % poisonInterval === 0) {
                        e.health -= e._poisonDps;
                        if (player.poisonSpreads) {
                            enemies.forEach(other => {
                                if (other !== e && Math.hypot(other.x - e.x, other.y - e.y) < 60 && (other._poisonTimer || 0) <= 0) {
                                    other._poisonDps = e._poisonDps * 0.7;
                                    other._poisonTimer = 60;
                                }
                            });
                        }
                        if (Math.random() < 0.3) createParticles(e.x, e.y, '#84cc16', 2);
                    }
                }

                // Stunned enemies don't move or shoot
                if (e._stunTimer > 0) return;

                // Determine target. Confused enemies target each other (or a minion)
                let targetX = player.x;
                let targetY = player.y;
                // Thrall taunt: enemies prefer attacking minions when they're close
                if (player.minionTaunt && minions.length > 0 && e._confused <= 0) {
                    let closestMinion = null, closestDist = 999999;
                    minions.forEach(m => {
                        const d = Math.hypot(m.x - e.x, m.y - e.y);
                        if (d < closestDist) { closestDist = d; closestMinion = m; }
                    });
                    // Only taunt if a minion is between the enemy and the player (within 180px)
                    if (closestMinion && closestDist < 180) {
                        targetX = closestMinion.x;
                        targetY = closestMinion.y;
                    }
                }
                if (e._confused > 0) {
                    const others = enemies.filter(o => o !== e);
                    if (others.length > 0) {
                        const o = others[Math.floor(Math.random() * Math.min(3, others.length))];
                        targetX = o.x; targetY = o.y;
                    }
                }

                const dx = targetX - e.x;
                const dy = targetY - e.y;
                const dist = Math.max(1, Math.hypot(dx, dy));
                let speed = e.speed;
                if (e.kind === 'saboteur') {
                    e.sprintTimer = (e.sprintTimer || 0) + 1;
                    if (e.sprintTimer % 160 > 115) speed *= 1.8;
                }
                if (e.kind === 'marksman' && dist < 250) speed *= 0.25;
                // Apply slow from sabotage / minion aura
                const slowFromBullets = e._slowAmount || 0;
                const slowFromMinions = e._minionSlow > 0 ? 0.35 : 0;
                const totalSlow = Math.min(0.85, slowFromBullets + slowFromMinions);
                speed *= (1 - totalSlow);
                e.vx = (dx / dist) * speed;
                e.vy = (dy / dist) * speed;
                e.x += e.vx;
                e.y += e.vy;
                
                if (e.shootRate) {
                    e.shootTimer--;
                    if (e.shootTimer <= 0) {
                        e.shootTimer = Math.max(35, e.shootRate - wave * 2);
                        const a = Math.atan2(player.y - e.y, player.x - e.x);
                        enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 3.2, vy: Math.sin(a) * 3.2, radius: 4, damage: e.kind === 'nikitaGuard' ? 8 : 5, age: 0, color: e.kind === 'nikitaGuard' ? '#ef4444' : '#facc15' });
                    }
                }
                if (e.aura && Math.random() < 0.03) createParticles(e.x, e.y, '#38bdf8', 1);
            });
            
            enemies = enemies.filter(e => {
                if (e.health <= 0) {
                    score += e.points;
                    kills++;
                    if (player.killDamageBoost) player.killBoostTimer = 120;
                    if (player.lifeSteal > 0) player.health = Math.min(player.health + player.lifeSteal, player.maxHealth);
                    createParticles(e.x, e.y, e.color, 15);
                    if (Math.random() < 0.10) powerups.push({ x: e.x, y: e.y, type: Math.random() < 0.65 ? 'health' : 'damage', radius: 7 });
                    // REANIMATION: Soul Shards drift toward player when specialized
                    if (player.permanentStaff && Math.random() < 0.35) {
                        soulShards.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*1.5, vy: (Math.random()-0.5)*1.5, life: 300, radius: 4 });
                    }
                    // REANIMATION: Restless Dead — chance to raise enemy as thrall
                    if (player.minionSpawnsOnKill > 0 && Math.random() < player.minionSpawnsOnKill) {
                        spawnMinionsAt(e.x, e.y, 1);
                    }
                    return false;
                }
                return true;
            });
            
            const now = Date.now();
            enemies.forEach(e => {
                const dist = Math.hypot(e.x - player.x, e.y - player.y);
                if (dist < e.radius + player.radius) {
                    if (player.iframes <= 0 && now - player.lastHitTime > 90) {
                        const reduction = Math.max(0, Math.min(0.75, player.armor + (player.lastStand && player.health < player.maxHealth * 0.35 ? 0.20 : 0)));
                        const dmgToTake = e.contact * (1 - reduction);
                        // Undying Loyalty: if this hit would drop us below 25%, a thrall intercepts
                        if (player.undyingLoyalty && !player.loyaltyUsed && minions.length > 0 && player.health - dmgToTake < player.maxHealth * 0.25) {
                            // Find nearest minion, sacrifice it
                            let nearest = null, nearestD = 99999;
                            minions.forEach(m => { const d = Math.hypot(m.x-player.x, m.y-player.y); if (d < nearestD) { nearestD=d; nearest=m; } });
                            if (nearest) {
                                nearest.health = -1; // kill it
                                player.iframes = 80;
                                player.loyaltyUsed = true;
                                createParticles(player.x, player.y, '#a78bfa', 30);
                                showSecretMessage('☠ THRALL INTERCEPTED THE HIT');
                            } else {
                                player.health -= dmgToTake;
                                player.lastHitTime = now;
                                player.iframes = (player.invulnDuration || 30) + (player.iframeBonus || 0);
                            }
                        } else {
                            player.health -= dmgToTake;
                            player.lastHitTime = now;
                            player.iframes = (player.invulnDuration || 30) + (player.iframeBonus || 0);
                        }
                    }
                    const pushAngle = Math.atan2(e.y - player.y, e.x - player.x);
                    const pushForce = 3.5;
                    e.x += Math.cos(pushAngle) * pushForce;
                    e.y += Math.sin(pushAngle) * pushForce;
                }
                if (player.hasKnockbackAura && dist < 75) {
                    const a = Math.atan2(e.y - player.y, e.x - player.x);
                    e.x += Math.cos(a) * 1.5;
                    e.y += Math.sin(a) * 1.5;
                }
            });
        }
        
        function updateEnemyBullets() {
            enemyBullets = enemyBullets.filter(b => {
                b.x += b.vx;
                b.y += b.vy;
                b.age++;
                const dist = Math.hypot(b.x - player.x, b.y - player.y);
                if (dist < b.radius + player.radius) {
                    if (player.autoDodge && player.autoDodgeCooldown <= 0) {
                        player.iframes = 35;
                        player.autoDodgeCooldown = 240;
                        createParticles(player.x, player.y, '#ffffff', 15);
                        return false;
                    }
                    if (player.iframes <= 0) {
                        const reduction = Math.max(0, Math.min(0.75, (player.bulletArmor || 0) + player.armor * 0.5));
                        player.health -= b.damage * (1 - reduction);
                        player.iframes = 20 + (player.iframeBonus || 0);
                    }
                    return false;
                }
                return b.x > -20 && b.x < canvas.width + 20 && b.y > -20 && b.y < canvas.height + 20 && b.age < 240;
            });
        }
        
        function updateMinions() {
            minions = minions.filter(m => {
                m.life--;
                if (m.life <= 0 || m.health <= 0) {
                    if (player.minionExplodes) {
                        enemies.forEach(e => {
                            if (Math.hypot(e.x - m.x, e.y - m.y) < 70) e.health -= m.damage * 1.5;
                        });
                        createParticles(m.x, m.y, '#a78bfa', 28);
                    } else {
                        createParticles(m.x, m.y, '#7c3aed', 10);
                    }
                    return false;
                }
                return true;
            });

            // Necromancer's Staff: permanent if specialized, otherwise only when thralls are all dead
            if (player.permanentStaff) {
                player.necromancerStaff = true;
            } else if (player.hasReanimation) {
                player.necromancerStaff = minions.length === 0;
            }

            minions.forEach(m => {
                let target = null;
                let bestDist = 99999;
                enemies.forEach(e => {
                    const d = Math.hypot(e.x - m.x, e.y - m.y);
                    if (d < bestDist) { bestDist = d; target = e; }
                });
                if (target) {
                    const a = Math.atan2(target.y - m.y, target.x - m.x);
                    m.vx = Math.cos(a) * m.speed;
                    m.vy = Math.sin(a) * m.speed;
                    m.x += m.vx;
                    m.y += m.vy;
                    // Melee contact
                    if (bestDist < target.radius + m.radius) {
                        target.health -= m.damage * 0.08; // per-frame damage tick
                        if (player.minionAura) target._minionSlow = 30;
                        // Lifesteal: thrall heals player on melee
                        if (player.minionLifesteal > 0) {
                            player.health = Math.min(player.maxHealth, player.health + player.minionLifesteal * 0.08);
                        }
                    }
                    // Aura slow
                    if (player.minionAura) {
                        enemies.forEach(e => {
                            if (Math.hypot(e.x - m.x, e.y - m.y) < 80) e._minionSlow = Math.max(e._minionSlow || 0, 10);
                        });
                    }
                    // Shooting
                    if (player.minionShoots) {
                        m.shootTimer--;
                        if (m.shootTimer <= 0 && bestDist < 260) {
                            m.shootTimer = 75;
                            const ang = Math.atan2(target.y - m.y, target.x - m.x);
                            const shotDmg = m.damage * 0.7;
                            bullets.push({
                                x: m.x, y: m.y,
                                vx: Math.cos(ang) * 5,
                                vy: Math.sin(ang) * 5,
                                radius: 3,
                                hitRadius: 5,
                                damage: shotDmg,
                                piercing: false,
                                hits: 0,
                                age: 0,
                                bounces: 0,
                                fromMinion: true
                            });
                            // lifesteal credit per shot fired (small)
                            if (player.minionLifesteal > 0) {
                                player.health = Math.min(player.maxHealth, player.health + player.minionLifesteal * 0.4);
                            }
                        }
                    }
                }
                // Take damage from contact with enemies
                enemies.forEach(e => {
                    const d = Math.hypot(e.x - m.x, e.y - m.y);
                    if (d < e.radius + m.radius) {
                        m.health -= e.contact * 0.5;
                    }
                });
            });
        }

        function drawMinion(m) {
            const x = m.x, y = m.y, s = 2;
            shadow(x, y, m.radius * 2, m.radius * 1.2);
            // Translucent ghost-spy: pale cap, sunken face, faded coat.
            ctx.globalAlpha = 0.85;
            px(x - 6, y - 7, 6, 7, '#4c1d95', s);
            px(x - 4, y - 12, 4, 4, '#e9d5ff', s);
            px(x - 5, y - 14, 5, 2, '#7c3aed', s);
            px(x - 2, y - 11, 1, 1, '#000', s);
            px(x + 2, y - 11, 1, 1, '#000', s);
            px(x - 4, y + 6, 2, 4, '#1e1b4b', s);
            px(x + 2, y + 6, 2, 4, '#1e1b4b', s);
            ctx.globalAlpha = 1;
            // life bar
            const w = 18;
            const pct = Math.max(0, m.health / m.maxHealth);
            ctx.fillStyle = '#000';
            ctx.fillRect(x - w/2, y - 18, w, 3);
            ctx.fillStyle = '#a78bfa';
            ctx.fillRect(x - w/2, y - 18, w * pct, 3);
        }

        function updatePowerupsAndParticles() {
            powerups = powerups.filter(p => {
                const dist = Math.hypot(p.x - player.x, p.y - player.y);
                if (dist < p.radius + player.radius) {
                    if (p.type === 'health') player.health = Math.min(player.health + 18, player.maxHealth);
                    else player.damage *= 1.04;
                    createParticles(p.x, p.y, '#ffff00', 10);
                    if (player.hasReanimation) spawnMinionsAt(p.x, p.y, player.minionsPerPickup);
                    return false;
                }
                return true;
            });
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                return p.life > 0;
            });
        }

        function updateSoulShards() {
            soulShards = soulShards.filter(s => {
                s.life--;
                // Drift toward player
                const dx = player.x - s.x, dy = player.y - s.y;
                const dist = Math.max(1, Math.hypot(dx, dy));
                const pull = dist < 120 ? 0.18 : 0.04;
                s.vx += (dx / dist) * pull;
                s.vy += (dy / dist) * pull;
                // Cap speed
                const spd = Math.hypot(s.vx, s.vy);
                if (spd > 3.5) { s.vx = (s.vx/spd)*3.5; s.vy = (s.vy/spd)*3.5; }
                s.x += s.vx; s.y += s.vy;
                if (dist < s.radius + player.radius + 4) {
                    // Absorbed: heal small amount and restore staff charge
                    player.health = Math.min(player.maxHealth, player.health + 4);
                    if (player.permanentStaff) player.staffCharge = Math.min(1, player.staffCharge + 0.06);
                    createParticles(s.x, s.y, '#a78bfa', 5);
                    return false;
                }
                return s.life > 0;
            });
        }

        function spawnMinionsAt(x, y, count) {
            for (let i = 0; i < count; i++) {
                const offsetA = Math.random() * Math.PI * 2;
                minions.push({
                    x: x + Math.cos(offsetA) * 12,
                    y: y + Math.sin(offsetA) * 12,
                    vx: 0, vy: 0,
                    radius: 8,
                    speed: 2.0,
                    health: 55 * player.minionHealthMult,
                    maxHealth: 55 * player.minionHealthMult,
                    damage: 14 * player.minionDamageMult,
                    contact: 0.5,
                    life: player.minionLifespan,
                    shootTimer: 30 + Math.floor(Math.random() * 30)
                });
            }
            createParticles(x, y, '#a78bfa', 18);
        }
        
        function updateUI() {
            document.getElementById('wave').textContent = wave;
            document.getElementById('score').textContent = score;
            document.getElementById('kills').textContent = kills;
            document.getElementById('healthBar').style.width = Math.max(0, player.health / player.maxHealth * 100) + '%';
            // Staff mode indicator
            let staffEl = document.getElementById('staffIndicator');
            if (!staffEl) {
                staffEl = document.createElement('div');
                staffEl.id = 'staffIndicator';
                staffEl.style.cssText = 'color:#a78bfa;text-shadow:0 0 8px #7c3aed;margin-top:4px;';
                document.getElementById('ui').appendChild(staffEl);
            }
            staffEl.textContent = player.necromancerStaff
                ? (player.permanentStaff ? '☠ NECROMANCER [HOLD: CHARGE]' : '☠ STAFF MODE')
                : player.hasSword
                    ? (player.swordOnFire
                        ? `⚔🔥 BLAZING SWORD${player.swordWhirlwind ? ' · WHIRL ' + Math.ceil(player.whirlwindTimer/60) + 's' : ''}`
                        : `⚔ SWORD MODE${player.swordWhirlwind ? ' · WHIRL ' + Math.ceil(player.whirlwindTimer/60) + 's' : ''}`)
                    : (minions.length > 0 ? `THRALLS: ${minions.length}` : '');
        }
        
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({ x, y, vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5, color, life: 20 + Math.random() * 25 });
            }
        }
        
        function createExplosion(x, y, chain = false) {
            enemies.forEach(e => {
                const dist = Math.hypot(e.x - x, e.y - y);
                if (dist < 55) {
                    e.health -= player.damage * 0.45;
                    if (chain && dist > 8 && Math.random() < 0.25) createParticles(e.x, e.y, '#ff6b00', 12);
                }
            });
            createParticles(x, y, '#ff6b00', 35);
        }
        
        function px(x, y, w, h, color, scale = 2) {
            ctx.fillStyle = color;
            ctx.fillRect(Math.round(x), Math.round(y), w * scale, h * scale);
        }
        function shadow(x, y, w, h) {
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.fillRect(x - w / 2, y + h / 2, w, 5);
        }
        
        function drawLarry(x, y, angle) {
            const s = 2;
            if (player.iframes > 0 && Math.floor(Date.now() / 100) % 2 === 0) ctx.globalAlpha = 0.5;
            shadow(x, y, 30, 18);
            // Larry: male blue-coated hero, square jaw, cap, tie, and blaster.
            px(x - 10, y - 18, 10, 2, '#0ea5e9', s);
            px(x - 8, y - 21, 8, 2, '#38bdf8', s);
            px(x - 6, y - 18, 6, 5, '#f1c27d', s);
            px(x - 7, y - 13, 7, 2, '#d08b5b', s);
            px(x - 4, y - 16, 1, 1, '#000', s);
            px(x + 4, y - 16, 1, 1, '#000', s);
            px(x - 8, y - 8, 8, 8, '#1d3557', s);
            px(x - 5, y - 7, 5, 6, '#3b82f6', s);
            px(x - 1, y - 7, 1, 5, '#ff0041', s);
            px(x - 8, y + 8, 3, 5, '#111827', s);
            px(x + 4, y + 8, 3, 5, '#111827', s);

            if (player.necromancerStaff) {
                // Draw a glowing necromancer staff
                const staffEnd = { x: x + Math.cos(angle) * 26, y: y - 4 + Math.sin(angle) * 26 };
                ctx.strokeStyle = '#6d28d9';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(x, y - 4);
                ctx.lineTo(staffEnd.x, staffEnd.y);
                ctx.stroke();
                ctx.strokeStyle = '#c4b5fd';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x, y - 4);
                ctx.lineTo(staffEnd.x, staffEnd.y);
                ctx.stroke();
                // Glowing orb at tip
                const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 120);
                ctx.globalAlpha = pulse;
                ctx.fillStyle = '#a78bfa';
                ctx.beginPath();
                ctx.arc(staffEnd.x, staffEnd.y, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = player.iframes > 0 && Math.floor(Date.now() / 100) % 2 === 0 ? 0.5 : 1;
            } else if (player.hasSword) {
                // Draw swinging sword
                const swinging = player.swordSwingTimer > 0;
                const displayAngle = swinging ? player.swordAngle : angle;
                const swordLen = player.swordRange >= 90 ? 38 : 28;
                const isWar = player.swordRange >= 90;

                // Fire glow behind sword if on fire
                if (player.swordOnFire) {
                    const fireAlpha = 0.35 + 0.25 * Math.sin(Date.now() / 60);
                    ctx.globalAlpha = fireAlpha;
                    ctx.strokeStyle = '#ff6b00';
                    ctx.lineWidth = swinging ? 14 : 8;
                    ctx.beginPath();
                    ctx.moveTo(x, y - 4);
                    ctx.lineTo(x + Math.cos(displayAngle) * swordLen, y - 4 + Math.sin(displayAngle) * swordLen);
                    ctx.stroke();
                    ctx.globalAlpha = player.iframes > 0 && Math.floor(Date.now() / 100) % 2 === 0 ? 0.5 : 1;
                }

                // Draw arc when swinging
                if (swinging) {
                    ctx.globalAlpha = 0.18;
                    ctx.fillStyle = player.swordOnFire ? '#fde68a' : (isWar ? '#c4b5fd' : '#00ff41');
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.arc(x, y, player.swordRange, displayAngle - player.swordArcWidth, displayAngle + player.swordArcWidth);
                    ctx.closePath();
                    ctx.fill();
                    ctx.globalAlpha = player.iframes > 0 && Math.floor(Date.now() / 100) % 2 === 0 ? 0.5 : 1;
                }

                // Whirlwind charge indicator ring
                if (player.swordWhirlwind && player.whirlwindTimer <= 30) {
                    const wwPulse = 0.4 + 0.4 * Math.sin(Date.now() / 60);
                    ctx.globalAlpha = wwPulse;
                    ctx.strokeStyle = player.swordOnFire ? '#fde68a' : '#fff';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(x, y, player.swordRange + 6, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = player.iframes > 0 && Math.floor(Date.now() / 100) % 2 === 0 ? 0.5 : 1;
                }

                // Sword blade
                const bladeColor = isWar ? '#c4b5fd' : '#e2e8f0';
                ctx.strokeStyle = bladeColor;
                ctx.lineWidth = swinging ? 5 : 3;
                ctx.beginPath();
                ctx.moveTo(x, y - 4);
                ctx.lineTo(x + Math.cos(displayAngle) * swordLen, y - 4 + Math.sin(displayAngle) * swordLen);
                ctx.stroke();
                // Handle cross-guard
                const guardX = x + Math.cos(displayAngle) * 8;
                const guardY = y - 4 + Math.sin(displayAngle) * 8;
                ctx.strokeStyle = '#94a3b8';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(guardX + Math.cos(displayAngle + Math.PI/2) * 7, guardY + Math.sin(displayAngle + Math.PI/2) * 7);
                ctx.lineTo(guardX + Math.cos(displayAngle - Math.PI/2) * 7, guardY + Math.sin(displayAngle - Math.PI/2) * 7);
                ctx.stroke();
                // Tip gleam
                ctx.fillStyle = swinging ? '#fff' : bladeColor;
                ctx.beginPath();
                ctx.arc(x + Math.cos(displayAngle) * swordLen, y - 4 + Math.sin(displayAngle) * swordLen, swinging ? 4 : 2, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(x, y - 4);
                ctx.lineTo(x + Math.cos(angle) * 18, y - 4 + Math.sin(angle) * 18);
                ctx.stroke();
                px(x + Math.cos(angle) * 16 - 2, y - 4 + Math.sin(angle) * 16 - 2, 3, 3, '#00ff41', 1);
            }
            ctx.globalAlpha = 1;
        }
        
        function drawAgent(e) {
            const x = e.x, y = e.y, s = 2;
            shadow(x, y, e.radius * 2.3, e.radius * 1.4);
            const coatColors = { scout: '#064e3b', agent: '#2b2d42', bruiser: '#7f1d1d', shield: '#3b0764', marksman: '#713f12', saboteur: '#881337', handler: '#075985', nikitaGuard: '#450a0a' };
            const coat = coatColors[e.kind] || '#2b2d42';
            // Nikita's agents: masculine spy silhouettes with coats, boots, hats, and no feminine sprite cues.
            px(x - 7, y - 9, 7, 9, coat, s);
            px(x - 5, y - 15, 5, 5, '#f1c27d', s);
            px(x - 6, y - 11, 6, 2, '#7c2d12', s); // jaw/beard line
            px(x - 7, y - 17, 7, 2, e.kind === 'nikitaGuard' ? '#ef4444' : '#8b0000', s);
            px(x - 9, y - 13, 2, 5, e.kind === 'nikitaGuard' ? '#ef4444' : '#8b0000', s);
            px(x + 8, y - 13, 2, 5, e.kind === 'nikitaGuard' ? '#ef4444' : '#8b0000', s);
            px(x - 5, y + 8, 2, 5, '#111', s);
            px(x + 4, y + 8, 2, 5, '#111', s);
            px(x - 3, y - 13, 1, 1, '#000', s);
            px(x + 4, y - 13, 1, 1, '#000', s);
            if (e.kind === 'marksman' || e.kind === 'nikitaGuard') {
                px(x + 7, y - 5, 8, 1, '#f8fafc', s);
            }
            if (e.kind === 'saboteur') {
                px(x - 10, y - 4, 3, 3, '#fb7185', s);
                px(x + 8, y - 4, 3, 3, '#fb7185', s);
            }
            if (e.kind === 'handler') {
                ctx.strokeStyle = '#38bdf8';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(x, y, 24, 0, Math.PI * 2);
                ctx.stroke();
            }
            if (e.kind === 'shield') {
                ctx.strokeStyle = '#c77dff';
                ctx.lineWidth = 2;
                ctx.strokeRect(x - 13, y - 15, 26, 30);
            }
            if (e.kind === 'nikitaGuard') {
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 3;
                ctx.strokeRect(x - 16, y - 18, 32, 36);
            }
        }
        
        function draw() {
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(0, 255, 65, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
            for (let i = 0; i < canvas.height; i += 40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }
            
            // Soul shards
            soulShards.forEach(s => {
                const alpha = Math.min(1, s.life / 60);
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#a78bfa';
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ede9fe';
                ctx.beginPath();
                ctx.arc(s.x - 1, s.y - 1, s.radius * 0.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });

            // Fire trail pools (BERSERKER)
            if (player.fireTrails && player.fireTrails.length > 0) {
                player.fireTrails.forEach(ft => {
                    const alpha = Math.min(0.45, ft.life / 90 * 0.45);
                    ctx.globalAlpha = alpha;
                    const grad = ctx.createRadialGradient(ft.x, ft.y, 0, ft.x, ft.y, ft.radius);
                    grad.addColorStop(0, '#fde68a');
                    grad.addColorStop(0.5, '#ff6b00');
                    grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(ft.x, ft.y, ft.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                });
            }

            particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = p.life / 40; ctx.fillRect(p.x - 2, p.y - 2, 4, 4); });
            ctx.globalAlpha = 1;
            powerups.forEach(p => { ctx.fillStyle = p.type === 'health' ? '#ff0080' : '#ffff00'; ctx.fillRect(p.x - p.radius, p.y - p.radius, p.radius * 2, p.radius * 2); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(p.x - p.radius, p.y - p.radius, p.radius * 2, p.radius * 2); });
            bullets.forEach(b => {
                if (b.isStaffOrb) {
                    // Pulsing dark energy orb
                    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 80);
                    ctx.globalAlpha = 0.9 * pulse;
                    ctx.fillStyle = b.isCharged ? '#4c1d95' : '#6d28d9';
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 0.7;
                    ctx.fillStyle = b.isCharged ? '#7c3aed' : '#c4b5fd';
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius * 0.55, 0, Math.PI * 2);
                    ctx.fill();
                    if (b.isCharged) {
                        ctx.globalAlpha = 0.4 * pulse;
                        ctx.fillStyle = '#ede9fe';
                        ctx.beginPath();
                        ctx.arc(b.x, b.y, b.radius * 0.25, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                } else if (b.fromMinion) { ctx.fillStyle = '#a78bfa'; ctx.fillRect(b.x - b.radius, b.y - b.radius, b.radius * 2, b.radius * 2); ctx.fillStyle = '#fff'; ctx.fillRect(b.x - 1, b.y - 1, 2, 2); }
                else { ctx.fillStyle = player.explosiveRounds ? '#ff6b00' : '#00ff41'; ctx.fillRect(b.x - b.radius, b.y - b.radius, b.radius * 2, b.radius * 2); ctx.fillStyle = '#fff'; ctx.fillRect(b.x - 1, b.y - 1, 2, 2); }
            });
            enemyBullets.forEach(b => { ctx.fillStyle = b.color || '#facc15'; ctx.fillRect(b.x - b.radius, b.y - b.radius, b.radius * 2, b.radius * 2); });
            enemies.forEach(e => {
                drawAgent(e);
                // Status effect indicators
                if (e._poisonTimer > 0) {
                    ctx.fillStyle = 'rgba(132, 204, 22, 0.35)';
                    ctx.fillRect(e.x - e.radius - 2, e.y - e.radius - 2, e.radius * 2 + 4, e.radius * 2 + 4);
                }
                if (e._slowTimer > 0) {
                    ctx.strokeStyle = 'rgba(56, 189, 248, 0.7)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.radius + 4, 0, Math.PI * 2);
                    ctx.stroke();
                }
                if (e._stunTimer > 0) {
                    ctx.fillStyle = '#facc15';
                    ctx.fillRect(e.x - 2, e.y - e.radius - 8, 4, 4);
                }
                if (e._marked) {
                    ctx.strokeStyle = '#ff0041';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(e.x - 6, e.y - e.radius - 10);
                    ctx.lineTo(e.x + 6, e.y - e.radius - 4);
                    ctx.moveTo(e.x + 6, e.y - e.radius - 10);
                    ctx.lineTo(e.x - 6, e.y - e.radius - 4);
                    ctx.stroke();
                }
            });
            minions.forEach(drawMinion);
            drawLarry(player.x, player.y, Math.atan2(mouse.y - player.y, mouse.x - player.x));

            // Staff charge bar
            if (player.necromancerStaff && player.permanentStaff && player.staffCharge > 0.01) {
                const bw = 36, bh = 5;
                const bx = player.x - bw/2, by = player.y - 30;
                ctx.fillStyle = '#1e1b4b';
                ctx.fillRect(bx, by, bw, bh);
                const grad = ctx.createLinearGradient(bx, by, bx + bw, by);
                grad.addColorStop(0, '#6d28d9');
                grad.addColorStop(1, '#c4b5fd');
                ctx.fillStyle = grad;
                ctx.fillRect(bx, by, bw * player.staffCharge, bh);
                if (player.staffCharge >= 1) {
                    ctx.fillStyle = player.staffCharge >= 1 ? '#fff' : 'transparent';
                    ctx.globalAlpha = 0.5 + 0.5 * Math.sin(Date.now() / 80);
                    ctx.fillRect(bx, by, bw, bh);
                    ctx.globalAlpha = 1;
                }
            }

            // Secret message overlay
            if (_secretMsgTimer > 0) {
                const alpha = Math.min(1, _secretMsgTimer / 40) * Math.min(1, (_secretMsgTimer) / 20);
                ctx.globalAlpha = Math.min(1, alpha);
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(canvas.width/2 - 220, canvas.height/2 - 36, 440, 72);
                ctx.strokeStyle = '#7c3aed';
                ctx.lineWidth = 2;
                ctx.strokeRect(canvas.width/2 - 220, canvas.height/2 - 36, 440, 72);
                ctx.fillStyle = '#c4b5fd';
                ctx.font = '9px "Press Start 2P", monospace';
                ctx.textAlign = 'center';
                const lines = _secretMsgText.split('\n');
                lines.forEach((line, i) => ctx.fillText(line, canvas.width/2, canvas.height/2 - 12 + i * 20));
                ctx.textAlign = 'left';
                ctx.globalAlpha = 1;
            }
            
            if (gameState === 'paused') {
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }
        
        function showFallbackRewards(options) {
            const healCard = document.createElement('div');
            healCard.className = 'upgrade-card';
            healCard.innerHTML = `<span class="tree-tag">SUPPLY DROP</span><h3>FIELD MEDIC</h3><p>Heal 25% of max HP.</p>`;
            healCard.onclick = () => chooseReward('heal');
            options.appendChild(healCard);
            const scoreCard = document.createElement('div');
            scoreCard.className = 'upgrade-card';
            scoreCard.innerHTML = `<span class="tree-tag">SUPPLY DROP</span><h3>INTEL CACHE</h3><p>Gain 500 points.</p>`;
            scoreCard.onclick = () => chooseReward('score');
            options.appendChild(scoreCard);
        }
        
        function chooseReward(type) {
            if (type === 'heal') player.health = Math.min(player.maxHealth, player.health + player.maxHealth * 0.25);
            if (type === 'score') score += 500;
            document.getElementById('upgradeMenu').classList.add('hidden');
            wave++;
            gameState = 'playing';
            spawnWave();
        }
        
        function renderTreeStatus() {
            const panel = document.getElementById('treeStatus');
            panel.innerHTML = '';
            treeNames.forEach(t => {
                const picks = picksInTree(t);
                const isChosen = player.chosenTree === t;
                const isLocked = player.lockedTrees.includes(t);
                const willTrigger = !player.chosenTree && picks >= SPECIALIZATION_THRESHOLD - 1 && picks < SPECIALIZATION_THRESHOLD;
                let cls = 'tree-pill';
                let suffix = '';
                if (isChosen) { cls += ' chosen'; suffix = ' ★ SPECIALIZED'; }
                else if (isLocked) { cls += ' locked'; suffix = ' LOCKED'; }
                else if (willTrigger) { cls += ' warn'; suffix = ' ⚠ NEXT PICK LOCKS OTHERS'; }
                const pill = document.createElement('span');
                pill.className = cls;
                pill.innerHTML = `${t} <span class="pill-count">${picks}/${SPECIALIZATION_THRESHOLD}</span>${suffix}`;
                panel.appendChild(pill);
            });
            // Universal pill (never locks)
            const uniPicks = picksInTree('UNIVERSAL');
            const uniPill = document.createElement('span');
            uniPill.className = 'tree-pill';
            uniPill.style.borderColor = '#9ca3af';
            uniPill.style.color = '#9ca3af';
            uniPill.innerHTML = `UNIVERSAL <span class="pill-count">${uniPicks}</span> · never locks`;
            panel.appendChild(uniPill);
        }

        function showUpgradeMenu() {
            const menu = document.getElementById('upgradeMenu');
            const options = document.getElementById('upgradeOptions');
            const specHint = document.getElementById('specHint');
            options.innerHTML = '';
            renderTreeStatus();

            if (player.chosenTree) {
                specHint.innerHTML = `Specialized in <b style="color:#facc15;">${player.chosenTree}</b>. All other main trees are permanently locked. UNIVERSAL upgrades remain available.`;
            } else {
                specHint.innerHTML = `Pick <b>${SPECIALIZATION_THRESHOLD}</b> upgrades from the same main tree to specialize. Doing so <b style="color:#ff0041;">permanently locks</b> the other main trees. UNIVERSAL upgrades never trigger this.`;
            }

            const available = upgrades.filter(isUpgradeAvailable);
            const locked = upgrades.filter(u => !isUpgradeAvailable(u) && levelOf(u.id) < u.max).slice(0, 2);
            // Try to show variety: pick at most 1-2 cards per tree so all available paths are visible
            const shuffled = [...available].sort(() => Math.random() - 0.5);
            const choices = [];
            const treeCount = {};
            for (const u of shuffled) {
                if ((treeCount[u.tree] || 0) >= (player.chosenTree ? 2 : 1)) continue;
                choices.push(u);
                treeCount[u.tree] = (treeCount[u.tree] || 0) + 1;
                if (choices.length >= 4) break;
            }
            // Fill remaining slots ignoring per-tree cap if we couldn't reach 4
            if (choices.length < 4) {
                for (const u of shuffled) {
                    if (choices.includes(u)) continue;
                    choices.push(u);
                    if (choices.length >= 4) break;
                }
            }
            if (available.length === 0) {
                menu.querySelector('p').innerHTML = `Wave ${wave} survived! No upgrades remain because your path is complete or locked out. Choose a supply reward.`;
                showFallbackRewards(options);
                menu.classList.remove('hidden');
                return;
            }
            if (choices.length < 4) choices.push(...locked.slice(0, 4 - choices.length));
            choices.forEach(upgrade => {
                const usable = isUpgradeAvailable(upgrade);
                const lockedReason = player.lockedTrees.includes(upgrade.tree)
                    ? `LOCKED — ${getChosenTree()} specialization closed this tree.`
                    : (upgrade.requires && levelOf(upgrade.requires) <= 0
                        ? `LOCKED — requires earlier skill in ${upgrade.tree} tree.`
                        : 'LOCKED — already maxed.');

                // Lock-warning preview for available cards
                let warningHTML = '';
                if (usable && upgrade.tree !== 'UNIVERSAL' && !player.chosenTree) {
                    const currentPicks = picksInTree(upgrade.tree);
                    const afterPicks = currentPicks + 1;
                    if (afterPicks >= SPECIALIZATION_THRESHOLD) {
                        const others = treeNames.filter(t => t !== upgrade.tree).join(', ');
                        warningHTML = `<div class="lock-warning danger">⚠ PICKING THIS LOCKS: ${others}</div>`;
                    } else {
                        const remaining = SPECIALIZATION_THRESHOLD - afterPicks;
                        warningHTML = `<div class="lock-progress">${upgrade.tree}: ${currentPicks} → ${afterPicks}/${SPECIALIZATION_THRESHOLD} · ${remaining} more pick${remaining === 1 ? '' : 's'} in this tree locks others</div>`;
                    }
                } else if (usable && upgrade.tree === 'UNIVERSAL') {
                    warningHTML = `<div class="lock-progress">Universal — does not affect tree locking.</div>`;
                } else if (usable && player.chosenTree) {
                    warningHTML = `<div class="lock-progress">In your chosen tree — safe to take.</div>`;
                }

                const card = document.createElement('div');
                card.className = 'upgrade-card' + (usable ? '' : ' locked');
                card.innerHTML = `<span class="tree-tag">${upgrade.tree} ${levelOf(upgrade.id)}/${upgrade.max}</span><h3>${upgrade.name}</h3><p>${upgrade.desc}</p>${usable ? warningHTML : `<div class="lock-text">${lockedReason}</div>`}`;
                if (usable) {
                    card.onclick = () => {
                        player.skillLevels[upgrade.id] = levelOf(upgrade.id) + 1;
                        lockOpposingTrees(upgrade.tree);
                        upgrade.apply();
                        player.bulletSize = Math.min(player.bulletSize, MAX_BULLET_SIZE);
                        player.fireRate = Math.max(player.fireRate, MIN_FIRE_RATE);
                        menu.classList.add('hidden');
                        wave++;
                        gameState = 'playing';
                        spawnWave();
                    };
                }
                options.appendChild(card);
            });
            menu.querySelector('p').innerHTML = `Wave ${wave} survived! ${player.chosenTree ? 'Specialized path: ' + player.chosenTree + '.' : 'Choose carefully — 4 picks in one main tree locks the others.'}`;
            menu.classList.remove('hidden');
        }
        
        function gameOver() {
            gameState = 'gameover';
            if (activeSpawnInterval) clearInterval(activeSpawnInterval);
            document.getElementById('pauseBtn').classList.add('hidden');
            document.getElementById('finalWave').textContent = wave;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.remove('hidden');
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>

</body>
</html>
