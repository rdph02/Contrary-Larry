<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrary Larry vs Nikita the Russian Spy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        #gameContainer {
            position: relative;
            background: linear-gradient(45deg, #1a1a2e 0%, #16213e 100%);
            border: 4px solid #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3),
                        inset 0 0 40px rgba(0, 0, 0, 0.5);
        }
        
        canvas {
            display: block;
            background: #0f3460;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff41;
            font-size: 10px;
            text-shadow: 2px 2px 0 #000, 0 0 10px rgba(0, 255, 65, 0.5);
            pointer-events: none;
            z-index: 10;
        }
        
        #ui div {
            margin-bottom: 5px;
        }
        
        .bar {
            width: 150px;
            height: 12px;
            background: #000;
            border: 2px solid #00ff41;
            margin-top: 3px;
            position: relative;
        }
        
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff41 0%, #00cc33 100%);
            transition: width 0.2s;
        }
        
        .health-fill {
            background: linear-gradient(90deg, #ff0041 0%, #cc0033 100%);
        }
        
        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 4px solid #00ff41;
            padding: 30px;
            text-align: center;
            color: #00ff41;
            z-index: 100;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.5);
        }
        
        #menu h1 {
            font-size: 16px;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 #000, 0 0 15px rgba(0, 255, 65, 0.8);
        }
        
        #menu h2 {
            font-size: 12px;
            margin-bottom: 20px;
            color: #ff0041;
            text-shadow: 2px 2px 0 #000;
        }
        
        #pauseBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #00ff41;
            color: #000;
            border: 2px solid #000;
            padding: 8px 16px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            cursor: pointer;
            z-index: 50;
            box-shadow: 3px 3px 0 #000;
        }
        
        #pauseBtn:hover {
            background: #00cc33;
        }
        
        #pauseMenu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.98);
            border: 4px solid #00ff41;
            padding: 40px;
            text-align: center;
            color: #00ff41;
            z-index: 150;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.5);
        }
        
        .menu-btn {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.2s;
            box-shadow: 4px 4px 0 #000;
        }
        
        .menu-btn:hover {
            background: #00cc33;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #000;
        }
        
        .menu-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }
        
        #upgradeMenu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 760px;
            max-height: 92vh;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.96);
            border: 4px solid #00ff41;
            padding: 20px;
            text-align: center;
            color: #00ff41;
            z-index: 100;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.5);
        }

        .upgrade-card.locked {
            opacity: 0.38;
            border-color: #555;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .upgrade-card.locked:hover {
            transform: none;
            box-shadow: none;
            background: #16213e;
        }

        .tree-tag {
            display: inline-block;
            margin-bottom: 8px;
            padding: 4px 6px;
            border: 1px solid #00ff41;
            color: #00ff41;
            font-size: 6px;
        }

        .upgrade-card:has(.tree-tag[data-tree="BERSERKER"]) {
            border-color: #f97316;
        }

        .lock-text {
            margin-top: 8px;
            color: #ff6b00;
            font-size: 6px;
            line-height: 1.4;
        }

        .lock-warning {
            margin-top: 6px;
            padding: 4px 6px;
            border: 1px dashed #ff6b00;
            color: #ff6b00;
            font-size: 6px;
            line-height: 1.4;
        }

        .lock-warning.danger {
            border-color: #ff0041;
            color: #ff0041;
            border-style: solid;
        }

        .lock-progress {
            margin-top: 6px;
            font-size: 6px;
            color: #9ca3af;
            line-height: 1.4;
        }

        #treeStatus {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin: 14px 0 6px 0;
            padding: 10px;
            border: 2px solid #1f4d7a;
            background: rgba(15, 52, 96, 0.4);
        }

        .tree-pill {
            font-size: 6px;
            padding: 4px 6px;
            border: 1px solid #00ff41;
            color: #00ff41;
            background: rgba(0,0,0,0.4);
            line-height: 1.4;
        }

        .tree-pill.chosen {
            border-color: #facc15;
            color: #facc15;
            box-shadow: 0 0 8px rgba(250, 204, 21, 0.5);
        }

        .tree-pill.locked {
            border-color: #555;
            color: #666;
            text-decoration: line-through;
        }

        .tree-pill.warn {
            border-color: #ff6b00;
            color: #ff6b00;
        }

        .tree-pill .pill-count {
            color: #fff;
        }

        #specHint {
            font-size: 7px;
            margin: 8px auto 4px auto;
            color: #9ca3af;
            line-height: 1.5;
            max-width: 600px;
        }

        .lock-text {
            color: #ff6b00;
            font-size: 6px;
            line-height: 1.4;
        }

        .upgrade-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .upgrade-card {
            background: #16213e;
            border: 3px solid #00ff41;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        
        .upgrade-card:hover {
            border-color: #00cc33;
            background: #1a2642;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
        }
        
        .upgrade-card h3 {
            font-size: 9px;
            margin-bottom: 8px;
            color: #ff0041;
        }
        
        .upgrade-card p {
            font-size: 7px;
            line-height: 1.4;
        }
        
        .hidden {
            display: none !important;
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 4px solid #ff0041;
            padding: 40px;
            text-align: center;
            color: #ff0041;
            z-index: 100;
            box-shadow: 0 0 30px rgba(255, 0, 65, 0.5);
        }
        
        #gameOver h1 {
            font-size: 20px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #000, 0 0 15px rgba(255, 0, 65, 0.8);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="ui">
            <div>WAVE: <span id="wave">1</span></div>
            <div>SCORE: <span id="score">0</span></div>
            <div>HP:
                <div class="bar">
                    <div class="bar-fill health-fill" id="healthBar" style="width: 100%"></div>
                </div>
            </div>
            <div>KILLS: <span id="kills">0</span></div>
        </div>
        
        <div id="menu">
            <h1>CONTRARY LARRY</h1>
            <h2>VS NIKITA THE RUSSIAN SPY</h2>
            <p style="font-size: 8px; margin: 20px 0;">Larry refuses to cooperate.<br>Nikita, a Russian spy-master, has sent his agents.</p>
            <button class="menu-btn" onclick="startGame()">START MISSION</button>
            <div style="font-size: 7px; margin-top: 20px; color: #666;">
                WASD: MOVE | MOUSE: AIM | CLICK: SHOOT | P: PAUSE
            </div>
        </div>
        
        <button id="pauseBtn" class="hidden" onclick="togglePause()">PAUSE</button>
        
        <div id="pauseMenu" class="hidden">
            <h1 style="font-size: 18px; margin-bottom: 30px;">PAUSED</h1>
            <button class="menu-btn" onclick="togglePause()">RESUME</button>
            <button class="menu-btn" onclick="location.reload()">RESTART</button>
        </div>
        
        <div id="upgradeMenu" class="hidden">
            <h1 style="font-size: 14px; margin-bottom: 12px;">WAVE SURVIVED!</h1>
            <p style="font-size: 8px; margin-bottom: 8px;">Choose your upgrade wisely...</p>
            <div id="treeStatus"></div>
            <div id="specHint"></div>
            <div class="upgrade-grid" id="upgradeOptions"></div>
        </div>
        
        <div id="gameOver" class="hidden">
            <h1>MISSION FAILED</h1>
            <p style="font-size: 10px; margin: 20px 0;">Wave: <span id="finalWave">1</span></p>
            <p style="font-size: 10px; margin: 20px 0;">Score: <span id="finalScore">0</span></p>
            <button class="menu-btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        
        const MAX_BULLET_SIZE = 8;
        const MAX_BULLET_HITBOX = 12;
        const MIN_FIRE_RATE = 50;
        const BASE_CANVAS_WIDTH = 800;
        const BASE_CANVAS_HEIGHT = 600;
        const MAX_CANVAS_WIDTH = 1160;
        const MAX_CANVAS_HEIGHT = 860;
        
        let gameState = 'menu';
        let previousGameState = 'menu';
        let isPaused = false;
        let wave = 1;
        let score = 0;
        let kills = 0;
        let waveSpawned = 0;
        let waveTarget = 0;
        let activeSpawnInterval = null;
        let barrageTimer = 0;
        
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            speed: 2.8,
            health: 100,
            maxHealth: 100,
            fireRate: 300,
            lastShot: 0,
            damage: 15,
            bulletSpeed: 6,
            bulletSize: 4,
            piercing: false,
            spread: 1,
            multishot: 1,
            lifeSteal: 0,
            explosiveRounds: false,
            recoil: 0,
            armor: 0,
            skillLevels: {},
            lockedTrees: [],
            chosenTree: null,
            iframes: 0,
            lastHitTime: 0,
            critChance: 0,
            invulnDuration: 30,
            dashCooldown: 0,
            hasDash: false,
            hasRegen: false,
            hasKnockbackAura: false,
            autoDodge: false,
            hasBarrage: false,
            barrageDamage: 0,
            chainExplosions: false,
            // REANIMATION (necromancy) tree state
            hasReanimation: false,
            minionsPerPickup: 1,
            minionDamageMult: 1,
            minionHealthMult: 1,
            minionLifespan: 600, // frames
            minionShoots: false,
            minionExplodes: false,
            minionSpawnsOnKill: 0, // chance %
            minionAura: false,
            minionLifesteal: 0,   // HP healed per melee hit
            necromancerStaff: false, // true when all thralls gone + has rean picks
            permanentStaff: false,   // true once specialized into REANIMATION
            staffCharge: 0,          // charge level for held-click staff shot (0..1)
            minionTaunt: false,      // thralls draw enemy aggro
            undyingLoyalty: false,   // a thrall intercepts when player is critically hit
            // BERSERKER tree state
            hasSword: false,           // gun replaced with swinging sword
            swordDamage: 0,            // base sword damage
            swordRange: 60,            // sword arc radius
            swordSwingRate: 400,       // ms between swings (cooldown)
            swordLastSwing: 0,
            swordSwingTimer: 0,        // frames remaining in active swing arc
            swordAngle: 0,             // current swing angle
            swordArcWidth: Math.PI * 0.55, // arc half-width in radians
            swordOnFire: false,        // Blazing Edge: sword leaves fire trail
            swordFireDamage: 0,        // burn dps per tick
            swordLifesteal: 0,         // % of sword damage healed
            swordVampiric: false,      // Bloodthirst: full lifesteal enabled
            berserkerRage: false,      // rage mode on low HP
            swordWhirlwind: false,     // Whirlwind: 360 spin attack periodically
            whirlwindTimer: 0,
            swordShockwave: false,     // Shockwave: charged swing launches knockback wave
            shockwaveCharge: 0,
            swordEchoBlade: false,     // Echo Blade: spectral second strike
            fireTrails: [],            // lingering fire zones on the ground
            // SABOTAGE tree state
            slowOnHit: 0, // 0..1 strength
            slowDuration: 0, // frames
            poisonDamage: 0, // dps multiplier
            poisonDuration: 0, // frames
            weakenStrength: 0, // 0..1, increases damage taken by enemy
            stunChance: 0, // 0..1
            confuseEnemies: false,
            saboteurMark: false // marked enemies take more damage
        };
        
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let particles = [];
        let powerups = [];
        let minions = [];
        let soulShards = [];
        
        const keys = {};
        let mouse = { x: canvas.width/2, y: canvas.height/2, down: false };
        
        const treeNames = ['STUBBORNNESS', 'DEFIANCE', 'CHAOS', 'CONTRARIAN', 'REANIMATION', 'SABOTAGE', 'BERSERKER'];
        const SPECIALIZATION_THRESHOLD = 4;
        
        const upgrades = [
            // STUBBORNNESS tree - tank and survival
            { id: 'stub1', tree: 'STUBBORNNESS', name: 'Thick Skin', desc: 'Larry ignores 15% damage.', max: 3, apply: () => { player.armor += 0.15; } },
            { id: 'stub2', tree: 'STUBBORNNESS', name: 'Fortified', desc: '+25 max HP.', max: 3, apply: () => { player.maxHealth += 25; player.health += 25; } },
            { id: 'stub3', tree: 'STUBBORNNESS', name: 'Unmovable', desc: 'Push enemies back on hit.', max: 3, requires: 'stub1', apply: () => { player.recoil += 1.2; } },
            { id: 'stub4', tree: 'STUBBORNNESS', name: 'Contrary Shield', desc: 'Heal 3 HP per kill.', max: 2, requires: 'stub2', apply: () => { player.lifeSteal += 3; } },
            { id: 'stub5', tree: 'STUBBORNNESS', name: 'Iron Will', desc: '+30 HP, +20% armor, slow regen.', max: 1, requires: 'stub3', apply: () => { player.maxHealth += 30; player.health += 30; player.armor += 0.20; player.hasRegen = true; }},
            { id: 'stub6', tree: 'STUBBORNNESS', name: 'Bunker Training', desc: 'Enemy bullets hurt 35% less.', max: 1, requires: 'stub5', apply: () => { player.bulletArmor = 0.35; }},
            { id: 'stub7', tree: 'STUBBORNNESS', name: 'PENULTIMATE: Last Stand', desc: 'Below 35% HP, gain armor and damage.', max: 1, requires: 'stub6', apply: () => { player.lastStand = true; }},
            { id: 'stub8', tree: 'STUBBORNNESS', name: 'IMMOVABLE OBJECT', desc: 'Knockback aura, longer invulnerability.', max: 1, requires: 'stub7', apply: () => { player.recoil += 3; player.hasKnockbackAura = true; player.invulnDuration = 150; }},
            
            // DEFIANCE tree - focused damage
            { id: 'def1', tree: 'DEFIANCE', name: 'Defiant Rounds', desc: '+40% bullet damage.', max: 3, apply: () => { player.damage *= 1.4; } },
            { id: 'def2', tree: 'DEFIANCE', name: 'Rapid Defiance', desc: '-25% fire-rate delay.', max: 3, apply: () => { player.fireRate *= 0.75; } },
            { id: 'def3', tree: 'DEFIANCE', name: 'Armor Piercing', desc: 'Bullets pierce enemies.', max: 1, requires: 'def1', apply: () => { player.piercing = true; } },
            { id: 'def4', tree: 'DEFIANCE', name: 'Explosive Dissent', desc: 'Bullets explode on hit.', max: 1, requires: 'def1', apply: () => { player.explosiveRounds = true; } },
            { id: 'def5', tree: 'DEFIANCE', name: 'Critical Strike', desc: '25% crit chance, 2x damage.', max: 1, requires: 'def3', apply: () => { player.critChance = 0.25; } },
            { id: 'def6', tree: 'DEFIANCE', name: 'Dead Drop Ammo', desc: 'Crits reload your next shot faster.', max: 1, requires: 'def5', apply: () => { player.critReload = true; }},
            { id: 'def7', tree: 'DEFIANCE', name: 'PENULTIMATE: No Witnesses', desc: 'Kills briefly boost damage.', max: 1, requires: 'def6', apply: () => { player.killDamageBoost = true; player.killBoostTimer = 0; }},
            { id: 'def8', tree: 'DEFIANCE', name: 'OVERWHELMING FORCE', desc: 'Triple damage, near-instant reload.', max: 1, requires: 'def7', apply: () => { player.damage *= 3; player.fireRate = Math.max(player.fireRate * 0.4, MIN_FIRE_RATE); player.bulletSpeed *= 1.5; }},
            
            // CHAOS tree - spread and area damage
            { id: 'chaos1', tree: 'CHAOS', name: 'Chaotic Burst', desc: 'Fire 1 extra bullet.', max: 3, apply: () => { player.multishot += 1; } },
            { id: 'chaos2', tree: 'CHAOS', name: 'Scatter Shot', desc: 'Add 1 spread angle.', max: 2, apply: () => { player.spread += 1; } },
            { id: 'chaos3', tree: 'CHAOS', name: 'Unpredictable', desc: '+30% bullet speed.', max: 2, requires: 'chaos1', apply: () => { player.bulletSpeed *= 1.3; } },
            { id: 'chaos4', tree: 'CHAOS', name: 'Mayhem', desc: 'Bigger bullets, capped to prevent exploits.', max: 2, requires: 'chaos2', apply: () => { player.bulletSize *= 1.4; } },
            { id: 'chaos5', tree: 'CHAOS', name: 'Chain Reaction', desc: 'Explosions chain to nearby foes.', max: 1, requires: 'chaos4', apply: () => { player.explosiveRounds = true; player.chainExplosions = true; }},
            { id: 'chaos6', tree: 'CHAOS', name: 'Wild Ricochet', desc: 'Some bullets bounce once off walls.', max: 1, requires: 'chaos5', apply: () => { player.ricochet = true; }},
            { id: 'chaos7', tree: 'CHAOS', name: 'PENULTIMATE: Spiral Pattern', desc: 'Barrage fires more often.', max: 1, requires: 'chaos6', apply: () => { player.barrageRateBonus = 35; }},
            { id: 'chaos8', tree: 'CHAOS', name: 'BULLET HELL', desc: '360-degree rotating barrage.', max: 1, requires: 'chaos7', apply: () => { player.hasBarrage = true; player.barrageDamage = player.damage * 0.6; }},
            
            // CONTRARIAN tree - mobility and dodge
            { id: 'contra1', tree: 'CONTRARIAN', name: 'Contrary Steps', desc: '+25% move speed.', max: 3, apply: () => { player.speed *= 1.25; } },
            { id: 'contra2', tree: 'CONTRARIAN', name: 'Evasive', desc: '+0.25s invulnerability after hit.', max: 2, apply: () => { player.iframeBonus = (player.iframeBonus || 0) + 15; } },
            { id: 'contra3', tree: 'CONTRARIAN', name: 'Fast Reflexes', desc: '+20% damage and speed.', max: 2, requires: 'contra1', apply: () => { player.damage *= 1.2; player.speed *= 1.2; } },
            { id: 'contra4', tree: 'CONTRARIAN', name: 'Parkour', desc: '+15 HP, +15% speed.', max: 2, requires: 'contra1', apply: () => { player.maxHealth += 15; player.health += 15; player.speed *= 1.15; } },
            { id: 'contra5', tree: 'CONTRARIAN', name: 'Shadow Step', desc: 'Dash with Space.', max: 1, requires: 'contra3', apply: () => { player.hasDash = true; player.dashCooldown = 0; }},
            { id: 'contra6', tree: 'CONTRARIAN', name: 'Smoke Bomb', desc: 'Dash damages nearby enemies.', max: 1, requires: 'contra5', apply: () => { player.dashBlast = true; }},
            { id: 'contra7', tree: 'CONTRARIAN', name: 'PENULTIMATE: Spybreaker', desc: 'Auto-dodge every few seconds.', max: 1, requires: 'contra6', apply: () => { player.autoDodge = true; player.autoDodgeCooldown = 0; }},
            { id: 'contra8', tree: 'CONTRARIAN', name: 'PERFECT DODGE', desc: 'Longer invulnerability and faster dash.', max: 1, requires: 'contra7', apply: () => { player.invulnDuration = 90; player.dashMaxCooldown = 45; }},
            
            // REANIMATION tree - necromancy: powerup pickups raise allied agents
            { id: 'rean1', tree: 'REANIMATION', name: 'Field Reanimation', desc: 'Picking up a drop raises a thrall. When all thralls fall, your gun becomes a Necromancer\'s Staff firing piercing dark orbs.', max: 1, apply: () => { player.hasReanimation = true; } },
            { id: 'rean2', tree: 'REANIMATION', name: 'Mass Grave', desc: '+1 thrall raised per drop picked up.', max: 2, requires: 'rean1', apply: () => { player.minionsPerPickup += 1; } },
            { id: 'rean3', tree: 'REANIMATION', name: 'Embalmed Bones', desc: 'Thralls have +60% health and live longer.', max: 2, requires: 'rean1', apply: () => { player.minionHealthMult *= 1.6; player.minionLifespan += 300; } },
            { id: 'rean4', tree: 'REANIMATION', name: 'Bitter Spite', desc: 'Thralls deal +50% damage.', max: 2, requires: 'rean1', apply: () => { player.minionDamageMult *= 1.5; } },
            { id: 'rean4b', tree: 'REANIMATION', name: 'Blood Tithe', desc: 'Thralls drain life on hit, healing you for each strike.', max: 3, requires: 'rean1', apply: () => { player.minionLifesteal += 1.5; } },
            { id: 'rean5', tree: 'REANIMATION', name: 'Spectral Volley', desc: 'Thralls fire ghostly shots at enemies.', max: 1, requires: 'rean4', apply: () => { player.minionShoots = true; } },
            { id: 'rean6', tree: 'REANIMATION', name: 'Restless Dead', desc: '15% chance enemies you kill rise as thralls.', max: 2, requires: 'rean3', apply: () => { player.minionSpawnsOnKill += 0.15; } },
            { id: 'rean7', tree: 'REANIMATION', name: 'PENULTIMATE: Death Pact', desc: 'Thralls explode in spite when they fall.', max: 1, requires: 'rean5', apply: () => { player.minionExplodes = true; } },
            { id: 'rean8', tree: 'REANIMATION', name: 'GRAVE COMMANDER', desc: 'Thralls slow nearby enemies. Massive thrall stat boost. Staff orbs grow larger and deal bonus damage.', max: 1, requires: 'rean7', apply: () => { player.minionAura = true; player.minionDamageMult *= 1.6; player.minionHealthMult *= 1.5; player.minionLifespan += 600; player.staffPowerBonus = true; } },
